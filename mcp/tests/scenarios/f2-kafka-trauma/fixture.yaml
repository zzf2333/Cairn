config:
  project_name: scenario-f2
  domains:
    - data
    - infra
  cognitive_mode: standard

state:
  stage:
    phase: growth
    confidence: 0.7
    status: advisory

skeleton:
  - domain: data
    role: data pipeline and event streaming
    owns:
      - event_pipeline
      - streaming
      - message_queue
    causal_keywords:
      - data
      - kafka
      - event
      - stream
      - queue
      - message
    dependencies:
