description: |
  Project is in `maintenance` phase with high confidence. Stage advisory should make the AI
  conservative about introducing new state-mgmt deps — it should surface the maintenance bias
  and require strong justification, not eagerly draft a migration.

required_tool_calls:
  - tool: cairn_context
    must_be_called: true

required_text_patterns:
  - pattern: "(?i)maintenance|维护"
    description: must reference the maintenance phase
  - pattern: "(?i)conservative|cautious|strong justification|carefully|risk|new dependency|new dep|审慎|保守"
  - pattern: "(?i)alternative|incremental|smaller|local|justification|why|是否.*必要"
    description: must propose a more conservative alternative or pushback

forbidden_text_patterns:
  - pattern: "(?i)here.?s the migration plan|step 1.*zustand|first PR|migration steps|installation"
    description: must not draft a full migration plan
