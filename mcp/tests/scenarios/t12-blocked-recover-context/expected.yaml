description: |
  A stale active_session with signals_count > 0 exists. The AI must detect it (via
  cairn_context or cairn_init_status), recover it via cairn_session_recover, then
  call cairn_context to start a fresh session. The exact detection path may vary.

required_tool_calls:
  - id: recover
    tool: cairn_session_recover
    must_be_called: true
    description: stale session must be recovered

  - id: fresh_ctx
    tool: cairn_context
    must_be_called: true
    description: cairn_context must be called after recovery

required_sequence:
  - id: recover_then_context
    steps:
      - tool: cairn_session_recover
      - tool: cairn_context
    description: recover must precede the working cairn_context call

max_total_tool_calls: 20
