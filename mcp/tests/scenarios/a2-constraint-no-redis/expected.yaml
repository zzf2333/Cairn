description: |
  Project has a G3 standing constraint: "never use Redis". When the user asks for a cache
  recommendation, the AI must consult Cairn and recommend alternatives without proposing Redis.

required_tool_calls:
  - tool: cairn_context
    must_be_called: true

required_text_patterns:
  - pattern: "(?i)redis|不能.*redis|排除.*redis"
    description: must acknowledge Redis is excluded (mentioning it in the negative)
  - pattern: "(?i)in-process|in-memory|lru|postgres|database|cache.*postgres|本地|进程内"
    description: must offer an in-process / DB-backed alternative

forbidden_text_patterns:
  - pattern: "(?i)我推荐.*redis|recommend\\s+redis|use\\s+redis|go\\s+with\\s+redis"
    description: must not recommend Redis
  - pattern: "(?i)redis.*best choice|redis.*top pick|redis.*我的首选"
    description: must not name Redis as the top choice
