name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  test:
    name: Full Test Suite
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm
          cache-dependency-path: mcp/package-lock.json

      - name: Install, build, and test
        working-directory: mcp
        run: |
          npm ci
          npm run build
          npm test

      - name: Verify version consistency
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          MCP_VERSION=$(node -p "require('./mcp/package.json').version")
          SERVER_VERSION=$(grep 'version:' mcp/src/server.ts | grep -v '"2.0"' | head -1 | grep -oP '"[^"]*"' | tr -d '"')
          CLI_VERSION=$(grep 'const VERSION' mcp/src/cli.ts | grep -oP '"[^"]*"' | tr -d '"')

          echo "Tag version:    $TAG_VERSION"
          echo "MCP version:    $MCP_VERSION"
          echo "Server version: $SERVER_VERSION"
          echo "CLI version:    $CLI_VERSION"

          if [ "$TAG_VERSION" != "$MCP_VERSION" ]; then
            echo "::error::Tag $TAG_VERSION does not match mcp/package.json $MCP_VERSION"
            exit 1
          fi
          if [ "$TAG_VERSION" != "$SERVER_VERSION" ]; then
            echo "::error::Tag $TAG_VERSION does not match mcp/src/server.ts $SERVER_VERSION"
            exit 1
          fi
          if [ "$TAG_VERSION" != "$CLI_VERSION" ]; then
            echo "::error::Tag $TAG_VERSION does not match mcp/src/cli.ts $CLI_VERSION"
            exit 1
          fi

      - name: Verify CHANGELOG entry exists
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          if ! grep -q "^\#\# \[${TAG_VERSION}\]" CHANGELOG.md; then
            echo "::error::No CHANGELOG.md entry found for version ${TAG_VERSION}"
            exit 1
          fi
          echo "CHANGELOG entry for ${TAG_VERSION} found."

  publish-npm:
    name: Publish to npm
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 18
          registry-url: https://registry.npmjs.org
          cache: npm
          cache-dependency-path: mcp/package-lock.json

      - name: Install and build
        working-directory: mcp
        run: |
          npm ci
          npm run build

      - name: Publish
        working-directory: mcp
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  github-release:
    name: Create GitHub Release
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract version
        id: version
        run: echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"

      - name: Extract CHANGELOG entry
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          awk "/^## \[${TAG_VERSION}\]/{found=1; next} found && /^## \[/{exit} found{print}" CHANGELOG.md > release_notes_body.md
          echo "Extracted CHANGELOG section for $TAG_VERSION"

      - name: Package Skills
        run: tar -czf cairn-skills-${{ steps.version.outputs.tag }}.tar.gz -C skills .

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            cairn-skills-${{ steps.version.outputs.tag }}.tar.gz
          body_path: release_notes_body.md
