<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 700" width="960" height="700">
  <style>
    text { font-family: "Helvetica Neue", Helvetica, Arial, "PingFang SC", "Microsoft YaHei", sans-serif; }
  </style>
  <defs>
    <marker id="arrow-blue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2563eb"/>
    </marker>
    <marker id="arrow-amber" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#f59e0b"/>
    </marker>
    <marker id="arrow-purple" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#9333ea"/>
    </marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#16a34a"/>
    </marker>
    <marker id="arrow-gray" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#374151"/>
    </marker>
    <marker id="arrow-green-dash" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#16a34a"/>
    </marker>
  </defs>
  <rect width="960" height="700" fill="#ffffff"/>

  <!-- Title & Subtitle -->
  <text x="480" y="38" text-anchor="middle" font-size="20" font-weight="600" fill="#111827">Signal Pipeline</text>
  <text x="480" y="58" text-anchor="middle" font-size="13" fill="#6b7280">From dual-ear capture to AI-consumable constraints</text>

  <!-- ═══════════════════════════════════════════════════════════ -->
  <!-- BAND 1: INPUT LAYER (y: 78-190) — Blue -->
  <!-- ═══════════════════════════════════════════════════════════ -->
  <rect x="20" y="78" width="650" height="112" rx="10" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1.5"/>
  <!-- Header -->
  <rect x="20" y="78" width="110" height="26" rx="10" fill="#2563eb"/>
  <rect x="80" y="78" width="50" height="26" fill="#2563eb"/>
  <text x="76" y="96" text-anchor="middle" font-size="11" font-weight="600" fill="#ffffff">Input Layer</text>

  <!-- Git Ear box -->
  <rect x="40" y="112" width="290" height="68" rx="8" fill="#ffffff" stroke="#bfdbfe" stroke-width="1.5"/>
  <text x="185" y="128" text-anchor="middle" font-size="12" font-weight="600" fill="#1d4ed8">Git Ear</text>
  <text x="55" y="144" font-size="10" fill="#374151">reverts</text>
  <text x="55" y="158" font-size="10" fill="#374151">dependency changes</text>
  <text x="55" y="172" font-size="10" fill="#374151">large refactors</text>
  <text x="190" y="144" font-size="10" fill="#374151">commit patterns</text>
  <text x="190" y="158" font-size="10" fill="#374151">new contributors</text>

  <!-- Conversation Ear box -->
  <rect x="350" y="112" width="300" height="68" rx="8" fill="#ffffff" stroke="#bfdbfe" stroke-width="1.5"/>
  <text x="500" y="128" text-anchor="middle" font-size="12" font-weight="600" fill="#1d4ed8">Conversation Ear</text>
  <text x="365" y="144" font-size="10" fill="#374151">cairn_signal()</text>
  <text x="365" y="158" font-size="10" fill="#374151">user rejections</text>
  <text x="365" y="172" font-size="10" fill="#374151">decisions</text>
  <text x="510" y="144" font-size="10" fill="#374151">constraints</text>
  <text x="510" y="158" font-size="10" fill="#374151">debt acceptance</text>

  <!-- Merge arrows from Git Ear and Conversation Ear down -->
  <line x1="185" y1="180" x2="310" y2="210" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow-blue)"/>
  <line x1="500" y1="180" x2="370" y2="210" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow-blue)"/>

  <!-- ═══════════════════════════════════════════════════════════ -->
  <!-- BAND 2: TRUST ROUTER (y: 210-340) — Amber -->
  <!-- ═══════════════════════════════════════════════════════════ -->
  <rect x="20" y="210" width="650" height="130" rx="10" fill="#fffbeb" stroke="#fde68a" stroke-width="1.5"/>
  <!-- Header -->
  <rect x="20" y="210" width="120" height="26" rx="10" fill="#f59e0b"/>
  <rect x="88" y="210" width="52" height="26" fill="#f59e0b"/>
  <text x="80" y="228" text-anchor="middle" font-size="11" font-weight="600" fill="#ffffff">Trust Router</text>

  <!-- L0 Drop -->
  <rect x="40" y="248" width="130" height="50" rx="8" fill="#fef3c7" stroke="#fde68a" stroke-width="1"/>
  <text x="105" y="268" text-anchor="middle" font-size="12" font-weight="600" fill="#92400e">L0 Drop</text>
  <text x="105" y="284" text-anchor="middle" font-size="10" fill="#78350f">noise / duplicates</text>

  <!-- L1 signals/ -->
  <rect x="185" y="248" width="130" height="50" rx="8" fill="#fef3c7" stroke="#fde68a" stroke-width="1"/>
  <text x="250" y="268" text-anchor="middle" font-size="12" font-weight="600" fill="#92400e">L1 signals/</text>
  <text x="250" y="284" text-anchor="middle" font-size="10" fill="#78350f">raw observations</text>

  <!-- L2 staged/ -->
  <rect x="330" y="248" width="130" height="50" rx="8" fill="#fef3c7" stroke="#fde68a" stroke-width="1"/>
  <text x="395" y="268" text-anchor="middle" font-size="12" font-weight="600" fill="#92400e">L2 staged/</text>
  <text x="395" y="284" text-anchor="middle" font-size="10" fill="#78350f">human review</text>

  <!-- L3 memory/ -->
  <rect x="475" y="248" width="130" height="50" rx="8" fill="#fef3c7" stroke="#fde68a" stroke-width="1"/>
  <text x="540" y="268" text-anchor="middle" font-size="12" font-weight="600" fill="#92400e">L3 memory/</text>
  <text x="540" y="284" text-anchor="middle" font-size="10" fill="#78350f">committed facts</text>

  <!-- Dashed arrow L1 → L2 -->
  <line x1="315" y1="273" x2="328" y2="273" stroke="#f59e0b" stroke-width="2" stroke-dasharray="6,4" marker-end="url(#arrow-amber)"/>
  <text x="322" y="318" text-anchor="middle" font-size="9" fill="#92400e">≥ 3 same</text>
  <text x="322" y="329" text-anchor="middle" font-size="9" fill="#92400e">domain+subject</text>

  <!-- "cairn review" arrow from L2 down -->
  <line x1="395" y1="298" x2="395" y2="358" stroke="#f59e0b" stroke-width="2" marker-end="url(#arrow-amber)"/>
  <text x="420" y="335" font-size="9" fill="#92400e">cairn_review()</text>

  <!-- Direct arrow from L3 down -->
  <line x1="540" y1="298" x2="540" y2="358" stroke="#f59e0b" stroke-width="2" marker-end="url(#arrow-amber)"/>

  <!-- ═══════════════════════════════════════════════════════════ -->
  <!-- BAND 3: MEMORY (y: 360-440) — Purple -->
  <!-- ═══════════════════════════════════════════════════════════ -->
  <rect x="20" y="360" width="650" height="80" rx="10" fill="#faf5ff" stroke="#d8b4fe" stroke-width="1.5"/>
  <!-- Header -->
  <rect x="20" y="360" width="96" height="26" rx="10" fill="#9333ea"/>
  <rect x="76" y="360" width="40" height="26" fill="#9333ea"/>
  <text x="68" y="378" text-anchor="middle" font-size="11" font-weight="600" fill="#ffffff">Memory</text>
  <text x="130" y="378" font-size="11" fill="#7c3aed">memory/ — YAML source of truth</text>

  <!-- Five type boxes -->
  <rect x="40" y="396" width="100" height="30" rx="8" fill="#ede9fe" stroke="#c4b5fd" stroke-width="1"/>
  <text x="90" y="416" text-anchor="middle" font-size="10" font-weight="600" fill="#5b21b6">decision</text>

  <rect x="152" y="396" width="100" height="30" rx="8" fill="#ede9fe" stroke="#c4b5fd" stroke-width="1"/>
  <text x="202" y="416" text-anchor="middle" font-size="10" font-weight="600" fill="#5b21b6">rejection</text>

  <rect x="264" y="396" width="100" height="30" rx="8" fill="#ede9fe" stroke="#c4b5fd" stroke-width="1"/>
  <text x="314" y="416" text-anchor="middle" font-size="10" font-weight="600" fill="#5b21b6">transition</text>

  <rect x="376" y="396" width="100" height="30" rx="8" fill="#ede9fe" stroke="#c4b5fd" stroke-width="1"/>
  <text x="426" y="416" text-anchor="middle" font-size="10" font-weight="600" fill="#5b21b6">debt</text>

  <rect x="488" y="396" width="100" height="30" rx="8" fill="#ede9fe" stroke="#c4b5fd" stroke-width="1"/>
  <text x="538" y="416" text-anchor="middle" font-size="10" font-weight="600" fill="#5b21b6">experiment</text>

  <!-- Arrow down to Band 4 -->
  <line x1="345" y1="440" x2="345" y2="458" stroke="#9333ea" stroke-width="2" marker-end="url(#arrow-purple)"/>

  <!-- ═══════════════════════════════════════════════════════════ -->
  <!-- BAND 4: VIEWS ENGINE (y: 460-540) — Green -->
  <!-- ═══════════════════════════════════════════════════════════ -->
  <rect x="20" y="460" width="650" height="80" rx="10" fill="#f0fdf4" stroke="#86efac" stroke-width="1.5"/>
  <!-- Header -->
  <rect x="20" y="460" width="120" height="26" rx="10" fill="#16a34a"/>
  <rect x="88" y="460" width="52" height="26" fill="#16a34a"/>
  <text x="76" y="478" text-anchor="middle" font-size="11" font-weight="600" fill="#ffffff">Views Engine</text>

  <!-- Three output boxes -->
  <rect x="40" y="494" width="200" height="36" rx="8" fill="#dcfce7" stroke="#86efac" stroke-width="1"/>
  <text x="140" y="512" text-anchor="middle" font-size="10" font-weight="600" fill="#15803d">output.md</text>
  <text x="140" y="525" text-anchor="middle" font-size="9" fill="#166534">global · 500/800 tokens</text>

  <rect x="252" y="494" width="190" height="36" rx="8" fill="#dcfce7" stroke="#86efac" stroke-width="1"/>
  <text x="347" y="512" text-anchor="middle" font-size="10" font-weight="600" fill="#15803d">domains/*.md</text>
  <text x="347" y="525" text-anchor="middle" font-size="9" fill="#166534">per-domain · 300/500 tokens</text>

  <rect x="454" y="494" width="190" height="36" rx="8" fill="#dcfce7" stroke="#86efac" stroke-width="1"/>
  <text x="549" y="512" text-anchor="middle" font-size="10" font-weight="600" fill="#15803d">stage.md</text>
  <text x="549" y="525" text-anchor="middle" font-size="9" fill="#166534">lifecycle advisory</text>

  <!-- Arrow down to Band 5 -->
  <line x1="345" y1="540" x2="345" y2="558" stroke="#16a34a" stroke-width="2" marker-end="url(#arrow-green)"/>

  <!-- ═══════════════════════════════════════════════════════════ -->
  <!-- BAND 5: AI CONSUMPTION (y: 560-620) — Gray -->
  <!-- ═══════════════════════════════════════════════════════════ -->
  <rect x="20" y="560" width="650" height="60" rx="10" fill="#f9fafb" stroke="#e5e7eb" stroke-width="1.5"/>
  <!-- Header -->
  <rect x="20" y="560" width="130" height="26" rx="10" fill="#374151"/>
  <rect x="96" y="560" width="54" height="26" fill="#374151"/>
  <text x="84" y="578" text-anchor="middle" font-size="11" font-weight="600" fill="#ffffff">AI Consumption</text>

  <text x="345" y="602" text-anchor="middle" font-size="13" fill="#374151" font-family="monospace">cairn_context()</text>
  <text x="510" y="602" font-size="11" fill="#6b7280">AI reads filtered constraints</text>

  <!-- ═══════════════════════════════════════════════════════════ -->
  <!-- RIGHT SIDEBAR: STAGE ADVISORY ENGINE (y: 78-620) — Green -->
  <!-- ═══════════════════════════════════════════════════════════ -->
  <rect x="690" y="78" width="250" height="542" rx="10" fill="#f0fdf4" stroke="#86efac" stroke-width="1.5"/>
  <!-- Header -->
  <rect x="690" y="78" width="130" height="26" rx="10" fill="#16a34a"/>
  <rect x="768" y="78" width="52" height="26" fill="#16a34a"/>
  <text x="756" y="96" text-anchor="middle" font-size="11" font-weight="600" fill="#ffffff">Stage Advisory</text>

  <!-- Phase items -->
  <circle cx="720" cy="140" r="5" fill="#16a34a"/>
  <text x="735" y="144" font-size="12" font-weight="600" fill="#15803d">exploration</text>
  <text x="735" y="160" font-size="10" fill="#6b7280">rapid prototyping, few constraints</text>

  <circle cx="720" cy="200" r="5" fill="#86efac" stroke="#16a34a" stroke-width="1.5"/>
  <text x="735" y="204" font-size="12" font-weight="600" fill="#15803d">growth</text>
  <text x="735" y="220" font-size="10" fill="#6b7280">stability over new features</text>

  <circle cx="720" cy="260" r="5" fill="#86efac" stroke="#16a34a" stroke-width="1.5"/>
  <text x="735" y="264" font-size="12" font-weight="600" fill="#15803d">maturity</text>
  <text x="735" y="280" font-size="10" fill="#6b7280">risk-averse, incremental</text>

  <circle cx="720" cy="320" r="5" fill="#86efac" stroke="#16a34a" stroke-width="1.5"/>
  <text x="735" y="324" font-size="12" font-weight="600" fill="#15803d">maintenance</text>
  <text x="735" y="340" font-size="10" fill="#6b7280">security fixes, minimal churn</text>

  <!-- Vertical connecting line between phases -->
  <line x1="720" y1="145" x2="720" y2="195" stroke="#86efac" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="720" y1="205" x2="720" y2="255" stroke="#86efac" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="720" y1="265" x2="720" y2="315" stroke="#86efac" stroke-width="1.5" stroke-dasharray="4,3"/>

  <!-- Bottom advisory text -->
  <rect x="710" y="380" width="210" height="50" rx="8" fill="#dcfce7" stroke="#86efac" stroke-width="1"/>
  <text x="815" y="400" text-anchor="middle" font-size="11" font-weight="600" fill="#15803d">advisory only</text>
  <text x="815" y="418" text-anchor="middle" font-size="11" fill="#6b7280">confidence ≥ 0.5</text>

  <!-- Dashed arrow from sidebar to Band 2 (stage-signal feeds trust router) -->
  <line x1="690" y1="275" x2="672" y2="275" stroke="#16a34a" stroke-width="2" stroke-dasharray="6,4" marker-end="url(#arrow-green-dash)"/>
  <text x="680" y="267" text-anchor="middle" font-size="9" fill="#16a34a" transform="rotate(-90 680 267)">stage signal</text>

  <!-- ═══════════════════════════════════════════════════════════ -->
  <!-- BOTTOM LEGEND (y: 640-690) -->
  <!-- ═══════════════════════════════════════════════════════════ -->
  <rect x="20" y="640" width="920" height="46" rx="8" fill="#f3f4f6" stroke="#e5e7eb" stroke-width="1"/>
  <text x="40" y="660" font-size="11" font-weight="600" fill="#374151">behavior_effect types:</text>

  <!-- avoid_suggestion (red) -->
  <circle cx="210" cy="663" r="5" fill="#dc2626"/>
  <text x="222" y="667" font-size="11" fill="#374151">avoid_suggestion</text>

  <!-- prefer_approach (green) -->
  <circle cx="370" cy="663" r="5" fill="#16a34a"/>
  <text x="382" y="667" font-size="11" fill="#374151">prefer_approach</text>

  <!-- warn_before (amber) -->
  <circle cx="520" cy="663" r="5" fill="#f59e0b"/>
  <text x="532" y="667" font-size="11" fill="#374151">warn_before</text>

  <!-- require_review (purple) -->
  <circle cx="650" cy="663" r="5" fill="#9333ea"/>
  <text x="662" y="667" font-size="11" fill="#374151">require_review</text>
</svg>