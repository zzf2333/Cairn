<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 640" width="960" height="640" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', Arial, 'PingFang SC', 'Microsoft YaHei', sans-serif">
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <polygon points="0 0, 8 4, 0 8" fill="#5a5a5a"/>
    </marker>
  </defs>
  <rect width="960" height="640" fill="#f8f6f3"/>

  <text x="480" y="44" text-anchor="middle" font-size="22" font-weight="700" fill="#1a1a1a">Daily Usage  —  one session, six tool calls</text>
  <text x="480" y="70" text-anchor="middle" font-size="14" fill="#6a6a6a">Sequence diagram: User ⇄ Host AI ⇄ Cairn ⇄ .cairn/</text>

  <!-- Lifelines -->
  <g font-size="13" font-weight="600" fill="#1a1a1a">
    <rect x="60" y="100" width="180" height="40" rx="10" fill="#a8c5e6" stroke="#4a4a4a" stroke-width="2"/>
    <text x="150" y="126" text-anchor="middle">User</text>

    <rect x="290" y="100" width="180" height="40" rx="10" fill="#a8c5e6" stroke="#4a4a4a" stroke-width="2"/>
    <text x="380" y="126" text-anchor="middle">Host AI</text>

    <rect x="520" y="100" width="180" height="40" rx="10" fill="#9dd4c7" stroke="#4a4a4a" stroke-width="2"/>
    <text x="610" y="126" text-anchor="middle">Cairn MCP</text>

    <rect x="750" y="100" width="160" height="40" rx="10" fill="#e8e6e3" stroke="#4a4a4a" stroke-width="2"/>
    <text x="830" y="126" text-anchor="middle">.cairn/</text>
  </g>

  <!-- vertical dashed lifelines -->
  <line x1="150" y1="140" x2="150" y2="612" stroke="#bdbdbd" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="380" y1="140" x2="380" y2="612" stroke="#bdbdbd" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="610" y1="140" x2="610" y2="612" stroke="#bdbdbd" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="830" y1="140" x2="830" y2="612" stroke="#bdbdbd" stroke-width="1" stroke-dasharray="4,4"/>

  <!-- Messages -->
  <g font-size="12" fill="#1a1a1a">
    <!-- 1: user → AI -->
    <line x1="150" y1="180" x2="375" y2="180" stroke="#5a5a5a" stroke-width="2" marker-end="url(#arrow)"/>
    <text x="262" y="174" text-anchor="middle" fill="#5a5a5a">"Add caching for /products"</text>

    <!-- 2: AI → Cairn cairn_context -->
    <line x1="380" y1="220" x2="605" y2="220" stroke="#5a5a5a" stroke-width="2" marker-end="url(#arrow)"/>
    <text x="492" y="214" text-anchor="middle" fill="#5a5a5a">cairn_context({ task: "caching" })</text>

    <!-- 2b: Cairn → disk read -->
    <line x1="610" y1="252" x2="825" y2="252" stroke="#5a5a5a" stroke-width="2" marker-end="url(#arrow)"/>
    <text x="717" y="246" text-anchor="middle" fill="#5a5a5a">load blood + skeleton + DNA</text>

    <!-- 2c: disk → Cairn -->
    <line x1="830" y1="282" x2="615" y2="282" stroke="#5a5a5a" stroke-width="2" marker-end="url(#arrow)"/>

    <!-- 2d: Cairn → AI returns context -->
    <line x1="610" y1="312" x2="385" y2="312" stroke="#5a5a5a" stroke-width="2" marker-end="url(#arrow)"/>
    <text x="498" y="306" text-anchor="middle" fill="#5a5a5a">no_go: ["redis"], DNA: simplicity=high</text>

    <!-- 3: AI → user proposes -->
    <line x1="380" y1="350" x2="155" y2="350" stroke="#5a5a5a" stroke-width="2" marker-end="url(#arrow)"/>
    <text x="268" y="344" text-anchor="middle" fill="#5a5a5a">"Proposing in-process LRU, no Redis"</text>

    <!-- 4: user accepts + defers invalidation -->
    <line x1="150" y1="390" x2="375" y2="390" stroke="#5a5a5a" stroke-width="2" marker-end="url(#arrow)"/>
    <text x="262" y="384" text-anchor="middle" fill="#5a5a5a">"Yes; skip invalidation for now"</text>

    <!-- 5: AI → Cairn cairn_signal -->
    <line x1="380" y1="430" x2="605" y2="430" stroke="#5a5a5a" stroke-width="2" stroke-dasharray="5,3" marker-end="url(#arrow)"/>
    <text x="492" y="424" text-anchor="middle" fill="#5a5a5a">cairn_signal({ type: "debt_acceptance" })</text>

    <!-- 5b: Cairn TrustRouter writes blood/staged -->
    <line x1="610" y1="462" x2="825" y2="462" stroke="#5a5a5a" stroke-width="2" stroke-dasharray="5,3" marker-end="url(#arrow)"/>
    <text x="717" y="456" text-anchor="middle" fill="#5a5a5a">route → write staged/&lt;id&gt;.yaml</text>

    <!-- 6: user "ship it" -->
    <line x1="150" y1="510" x2="375" y2="510" stroke="#5a5a5a" stroke-width="2" marker-end="url(#arrow)"/>
    <text x="262" y="504" text-anchor="middle" fill="#5a5a5a">"Looks good, ship it"</text>

    <!-- 7: AI → Cairn cairn_session_end -->
    <line x1="380" y1="550" x2="605" y2="550" stroke="#5a5a5a" stroke-width="2" stroke-dasharray="5,3" marker-end="url(#arrow)"/>
    <text x="492" y="544" text-anchor="middle" fill="#5a5a5a">cairn_session_end({ summary })</text>

    <!-- 7b: cairn → disk -->
    <line x1="610" y1="582" x2="825" y2="582" stroke="#5a5a5a" stroke-width="2" stroke-dasharray="5,3" marker-end="url(#arrow)"/>
    <text x="717" y="576" text-anchor="middle" fill="#5a5a5a">git scan + decay + calibrate + views</text>
  </g>

  <text x="480" y="624" text-anchor="middle" font-size="11" fill="#6a6a6a">Solid arrows = reads/responses.  Dashed arrows = writes.</text>
</svg>
