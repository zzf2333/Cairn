<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 360" width="960" height="360">
  <style>
    text { font-family: "Helvetica Neue", Helvetica, Arial, "PingFang SC", "Microsoft YaHei", sans-serif; }
  </style>
  <defs>
    <marker id="arrow-blue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2563eb"/>
    </marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#16a34a"/>
    </marker>
    <marker id="arrow-amber" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#f59e0b"/>
    </marker>
    <marker id="arrow-purple" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#9333ea"/>
    </marker>
    <marker id="arrow-gray" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#374151"/>
    </marker>
    <marker id="arrow-orange-up" markerWidth="7" markerHeight="10" refX="3.5" refY="0" orient="auto">
      <polygon points="0 10, 3.5 0, 7 10" fill="#ea580c"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="960" height="360" fill="#ffffff"/>

  <!-- Title & Subtitle -->
  <text x="480" y="30" text-anchor="middle" font-size="20" font-weight="600" fill="#111827">Daily Usage — Fully Automatic</text>
  <text x="480" y="50" text-anchor="middle" font-size="13" fill="#6b7280">After init, the AI drives the memory loop. Human reviews periodically.</text>

  <!-- "AUTOMATIC" label above main flow -->
  <rect x="370" y="62" width="120" height="20" rx="10" fill="#eff6ff"/>
  <text x="430" y="76" text-anchor="middle" font-size="10" font-weight="600" fill="#2563eb">AUTOMATIC</text>

  <!-- ===== Step 1: AI Opens Project ===== -->
  <rect x="20" y="92" width="150" height="120" rx="10" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1.5"/>
  <!-- Accent top bar -->
  <rect x="20" y="92" width="150" height="6" rx="3" fill="#2563eb"/>
  <!-- Play icon -->
  <text x="95" y="126" text-anchor="middle" font-size="22" fill="#2563eb">▶</text>
  <!-- Label -->
  <text x="95" y="148" text-anchor="middle" font-size="12" font-weight="600" fill="#1e3a5f">AI Opens Project</text>
  <!-- Subtext line 1 -->
  <text x="95" y="165" text-anchor="middle" font-size="10" fill="#6b7280">MCP Server starts</text>
  <!-- Subtext line 2 -->
  <text x="95" y="179" text-anchor="middle" font-size="10" fill="#6b7280">Git Ear scans since</text>
  <text x="95" y="191" text-anchor="middle" font-size="10" fill="#6b7280">last session</text>

  <!-- Arrow 1→2 -->
  <line x1="170" y1="152" x2="193" y2="152" stroke="#16a34a" stroke-width="2" marker-end="url(#arrow-green)"/>

  <!-- ===== Step 2: cairn_context() ===== -->
  <rect x="195" y="92" width="150" height="120" rx="10" fill="#f0fdf4" stroke="#86efac" stroke-width="1.5"/>
  <rect x="195" y="92" width="150" height="6" rx="3" fill="#16a34a"/>
  <!-- Function name -->
  <text x="270" y="124" text-anchor="middle" font-size="12" font-weight="700" fill="#16a34a" font-family="monospace">cairn_context()</text>
  <!-- Label -->
  <text x="270" y="148" text-anchor="middle" font-size="12" font-weight="600" fill="#14532d">Load Constraints</text>
  <!-- Subtext -->
  <text x="270" y="165" text-anchor="middle" font-size="10" fill="#6b7280">stage · no-go · debt</text>
  <text x="270" y="179" text-anchor="middle" font-size="10" fill="#6b7280">domains</text>

  <!-- Arrow 2→3 -->
  <line x1="345" y1="152" x2="368" y2="152" stroke="#f59e0b" stroke-width="2" marker-end="url(#arrow-amber)"/>

  <!-- ===== Step 3: Work + cairn_signal() ===== -->
  <rect x="370" y="92" width="190" height="120" rx="10" fill="#fffbeb" stroke="#fde68a" stroke-width="1.5"/>
  <rect x="370" y="92" width="190" height="6" rx="3" fill="#f59e0b"/>
  <!-- Function name -->
  <text x="465" y="124" text-anchor="middle" font-size="12" font-weight="700" fill="#f59e0b" font-family="monospace">cairn_signal()</text>
  <!-- Label -->
  <text x="465" y="148" text-anchor="middle" font-size="12" font-weight="600" fill="#78350f">AI Works Within</text>
  <text x="465" y="163" text-anchor="middle" font-size="12" font-weight="600" fill="#78350f">Constraints</text>
  <!-- Subtext -->
  <text x="465" y="180" text-anchor="middle" font-size="10" fill="#6b7280">Captures decisions,</text>
  <text x="465" y="192" text-anchor="middle" font-size="10" fill="#6b7280">rejections, constraints</text>
  <!-- Loop indicator -->
  <path d="M 540,108 A 10,10 0 1,1 540,128" stroke="#f59e0b" stroke-width="1.5" fill="none" marker-end="url(#arrow-amber)"/>
  <text x="548" y="122" font-size="8" fill="#b45309">×N</text>

  <!-- Arrow 3→4 -->
  <line x1="560" y1="152" x2="583" y2="152" stroke="#9333ea" stroke-width="2" marker-end="url(#arrow-purple)"/>

  <!-- ===== Step 4: cairn_session_end() ===== -->
  <rect x="585" y="92" width="150" height="120" rx="10" fill="#faf5ff" stroke="#d8b4fe" stroke-width="1.5"/>
  <rect x="585" y="92" width="150" height="6" rx="3" fill="#9333ea"/>
  <!-- Function name -->
  <text x="660" y="120" text-anchor="middle" font-size="11" font-weight="700" fill="#9333ea" font-family="monospace">cairn_session_end()</text>
  <!-- Label -->
  <text x="660" y="148" text-anchor="middle" font-size="12" font-weight="600" fill="#3b0764">Session End</text>
  <!-- Subtext -->
  <text x="660" y="165" text-anchor="middle" font-size="10" fill="#6b7280">batch L1 signals</text>
  <text x="660" y="179" text-anchor="middle" font-size="10" fill="#6b7280">regenerate views</text>
  <text x="660" y="193" text-anchor="middle" font-size="10" fill="#6b7280">session record</text>

  <!-- Arrow 4→5 -->
  <line x1="735" y1="152" x2="758" y2="152" stroke="#374151" stroke-width="2" marker-end="url(#arrow-gray)"/>

  <!-- ===== Step 5: AI Closes ===== -->
  <rect x="760" y="92" width="160" height="120" rx="10" fill="#f9fafb" stroke="#e5e7eb" stroke-width="1.5"/>
  <rect x="760" y="92" width="160" height="6" rx="3" fill="#374151"/>
  <!-- Icon -->
  <text x="840" y="126" text-anchor="middle" font-size="22" fill="#374151">⏹</text>
  <!-- Label -->
  <text x="840" y="148" text-anchor="middle" font-size="12" font-weight="600" fill="#374151">Server Exits</text>
  <!-- Subtext -->
  <text x="840" y="165" text-anchor="middle" font-size="10" fill="#6b7280">Memory persists</text>
  <text x="840" y="179" text-anchor="middle" font-size="10" fill="#6b7280">in .cairn/</text>

  <!-- ===== Human Action: cairn review ===== -->
  <!-- "MANUAL" label -->
  <rect x="420" y="230" width="90" height="20" rx="10" fill="#fff7ed"/>
  <text x="465" y="244" text-anchor="middle" font-size="10" font-weight="600" fill="#ea580c">MANUAL</text>

  <!-- Dashed box -->
  <rect x="370" y="258" width="280" height="72" rx="10" fill="#fff7ed" stroke="#ea580c" stroke-width="1.5" stroke-dasharray="8,4"/>
  <!-- Clock icon -->
  <text x="395" y="292" font-size="18">🕐</text>
  <!-- Command name -->
  <text x="430" y="288" font-size="14" font-weight="700" fill="#ea580c" font-family="monospace">cairn_review()</text>
  <!-- Subtext -->
  <text x="510" y="310" text-anchor="middle" font-size="11" fill="#9a3412">AI presents staged entries for user decision</text>

  <!-- Dashed arrow: human action → main flow -->
  <line x1="510" y1="258" x2="510" y2="216" stroke="#ea580c" stroke-width="1.5" stroke-dasharray="6,3" marker-end="url(#arrow-orange-up)"/>

  <!-- Step numbers -->
  <circle cx="34" cy="106" r="8" fill="#2563eb"/>
  <text x="34" y="110" text-anchor="middle" font-size="9" font-weight="600" fill="#ffffff">1</text>
  <circle cx="209" cy="106" r="8" fill="#16a34a"/>
  <text x="209" y="110" text-anchor="middle" font-size="9" font-weight="600" fill="#ffffff">2</text>
  <circle cx="384" cy="106" r="8" fill="#f59e0b"/>
  <text x="384" y="110" text-anchor="middle" font-size="9" font-weight="600" fill="#ffffff">3</text>
  <circle cx="599" cy="106" r="8" fill="#9333ea"/>
  <text x="599" y="110" text-anchor="middle" font-size="9" font-weight="600" fill="#ffffff">4</text>
  <circle cx="774" cy="106" r="8" fill="#374151"/>
  <text x="774" y="110" text-anchor="middle" font-size="9" font-weight="600" fill="#ffffff">5</text>

  <!-- Bottom tagline -->
  <text x="480" y="350" text-anchor="middle" font-size="11" fill="#9ca3af">The only manual step is periodic review — everything else is AI-driven</text>
</svg>