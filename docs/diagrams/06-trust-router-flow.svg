<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 720" width="960" height="720" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', Arial, 'PingFang SC', 'Microsoft YaHei', sans-serif">
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <polygon points="0 0, 8 4, 0 8" fill="#5a5a5a"/>
    </marker>
  </defs>
  <rect width="960" height="720" fill="#f8f6f3"/>

  <text x="480" y="44" text-anchor="middle" font-size="22" font-weight="700" fill="#1a1a1a">TrustRouter  —  signal routing decision flow</text>
  <text x="480" y="70" text-anchor="middle" font-size="14" fill="#6a6a6a">Every signal goes through these gates, in this order.</text>

  <!-- Start -->
  <rect x="380" y="98" width="200" height="56" rx="28" fill="#a8c5e6" stroke="#4a4a4a" stroke-width="2.5"/>
  <text x="480" y="132" text-anchor="middle" font-size="14" font-weight="600" fill="#1a1a1a">incoming signal</text>

  <line x1="480" y1="156" x2="480" y2="180" stroke="#5a5a5a" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Gate 1: dedup -->
  <polygon points="480,184 620,232 480,280 340,232" fill="#f4e4c1" stroke="#4a4a4a" stroke-width="2"/>
  <text x="480" y="226" text-anchor="middle" font-size="13" font-weight="600" fill="#1a1a1a">duplicate of</text>
  <text x="480" y="244" text-anchor="middle" font-size="13" font-weight="600" fill="#1a1a1a">existing Blood?</text>

  <line x1="620" y1="232" x2="700" y2="232" stroke="#5a5a5a" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="660" y="222" text-anchor="middle" font-size="11" fill="#5a5a5a">yes</text>

  <rect x="700" y="206" width="200" height="52" rx="10" fill="#e8e6e3" stroke="#4a4a4a" stroke-width="2"/>
  <text x="800" y="230" text-anchor="middle" font-size="12" font-weight="600" fill="#1a1a1a">merge / dropped</text>
  <text x="800" y="250" text-anchor="middle" font-size="11" fill="#6a6a6a">audit logged</text>

  <line x1="480" y1="280" x2="480" y2="304" stroke="#5a5a5a" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="500" y="296" font-size="11" fill="#5a5a5a">no</text>

  <!-- Gate 2: governance threshold -->
  <polygon points="480,308 620,356 480,404 340,356" fill="#f4e4c1" stroke="#4a4a4a" stroke-width="2"/>
  <text x="480" y="350" text-anchor="middle" font-size="13" font-weight="600" fill="#1a1a1a">below governance</text>
  <text x="480" y="368" text-anchor="middle" font-size="13" font-weight="600" fill="#1a1a1a">approval threshold?</text>

  <line x1="340" y1="356" x2="260" y2="356" stroke="#5a5a5a" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="300" y="346" text-anchor="middle" font-size="11" fill="#5a5a5a">yes (low G)</text>

  <rect x="60" y="330" width="200" height="52" rx="10" fill="#9dd4c7" stroke="#4a4a4a" stroke-width="2"/>
  <text x="160" y="354" text-anchor="middle" font-size="12" font-weight="600" fill="#1a1a1a">blood  (auto-confirmed)</text>
  <text x="160" y="374" text-anchor="middle" font-size="11" fill="#6a6a6a">G0 / G1, mode-dependent</text>

  <line x1="480" y1="404" x2="480" y2="428" stroke="#5a5a5a" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="500" y="420" font-size="11" fill="#5a5a5a">no</text>

  <!-- Gate 3: trauma escalation -->
  <polygon points="480,432 620,480 480,528 340,480" fill="#f4e4c1" stroke="#4a4a4a" stroke-width="2"/>
  <text x="480" y="474" text-anchor="middle" font-size="13" font-weight="600" fill="#1a1a1a">near a trauma</text>
  <text x="480" y="492" text-anchor="middle" font-size="13" font-weight="600" fill="#1a1a1a">domain?</text>

  <line x1="620" y1="480" x2="700" y2="480" stroke="#5a5a5a" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="660" y="470" text-anchor="middle" font-size="11" fill="#5a5a5a">yes</text>

  <rect x="700" y="454" width="200" height="52" rx="10" fill="#ffffff" stroke="#4a4a4a" stroke-width="2"/>
  <text x="800" y="478" text-anchor="middle" font-size="12" font-weight="600" fill="#1a1a1a">gravity ↑ one level</text>
  <text x="800" y="498" text-anchor="middle" font-size="11" fill="#6a6a6a">sensitivity_multiplier</text>

  <line x1="800" y1="506" x2="800" y2="556" stroke="#5a5a5a" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="800" y1="556" x2="620" y2="556" stroke="#5a5a5a" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrow)"/>

  <line x1="480" y1="528" x2="480" y2="552" stroke="#5a5a5a" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="500" y="544" font-size="11" fill="#5a5a5a">no</text>

  <!-- Gate 4: DNA modulation -->
  <polygon points="480,556 620,604 480,652 340,604" fill="#f4e4c1" stroke="#4a4a4a" stroke-width="2"/>
  <text x="480" y="598" text-anchor="middle" font-size="13" font-weight="600" fill="#1a1a1a">DNA trait</text>
  <text x="480" y="616" text-anchor="middle" font-size="13" font-weight="600" fill="#1a1a1a">applies?</text>

  <line x1="340" y1="604" x2="260" y2="604" stroke="#5a5a5a" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="300" y="594" text-anchor="middle" font-size="11" fill="#5a5a5a">yes</text>

  <rect x="60" y="578" width="200" height="52" rx="10" fill="#ffffff" stroke="#4a4a4a" stroke-width="2"/>
  <text x="160" y="602" text-anchor="middle" font-size="12" font-weight="600" fill="#1a1a1a">modulate gravity</text>
  <text x="160" y="622" text-anchor="middle" font-size="11" fill="#6a6a6a">skipped if reevaluation_mode</text>

  <line x1="160" y1="630" x2="160" y2="676" stroke="#5a5a5a" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="160" y1="676" x2="340" y2="676" stroke="#5a5a5a" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrow)"/>

  <!-- Final routing -->
  <rect x="340" y="664" width="280" height="40" rx="20" fill="#9dd4c7" stroke="#4a4a4a" stroke-width="2"/>
  <text x="480" y="688" text-anchor="middle" font-size="13" font-weight="700" fill="#1a1a1a">staged  (G2 / G3)  —  human review</text>
</svg>
