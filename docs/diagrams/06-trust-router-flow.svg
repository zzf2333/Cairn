<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 560" width="960" height="560">
  <style>
    text { font-family: "Helvetica Neue", Helvetica, Arial, "PingFang SC", "Microsoft YaHei", sans-serif; }
  </style>
  <defs>
    <marker id="arrow-gray" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#6b7280"/>
    </marker>
    <marker id="arrow-red" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#ef4444"/>
    </marker>
    <marker id="arrow-amber" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#f59e0b"/>
    </marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#16a34a"/>
    </marker>
    <marker id="arrow-purple" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#9333ea"/>
    </marker>
    <marker id="arrow-purple-dash" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#9333ea"/>
    </marker>
  </defs>
  <rect width="960" height="560" fill="#ffffff"/>

  <!-- Title & Subtitle -->
  <text x="480" y="32" text-anchor="middle" font-size="20" font-weight="600" fill="#111827">Trust Router — Decision Flow</text>
  <text x="480" y="52" text-anchor="middle" font-size="13" fill="#6b7280">Every signal must pass through. No signal bypasses it.</text>

  <!-- ═══════════════════════════════════════════════════════════ -->
  <!-- ENTRY POINT: Signal enters Trust Router (top center)      -->
  <!-- ═══════════════════════════════════════════════════════════ -->
  <rect x="195" y="70" width="200" height="34" rx="10" fill="#dbeafe" stroke="#2563eb" stroke-width="1.5"/>
  <text x="295" y="92" text-anchor="middle" font-size="12" font-weight="600" fill="#1e40af">Signal enters Trust Router</text>

  <!-- Arrow down from entry to Decision 1 -->
  <line x1="295" y1="104" x2="295" y2="120" stroke="#6b7280" stroke-width="1.5" marker-end="url(#arrow-gray)"/>

  <!-- ═══════════════════════════════════════════════════════════ -->
  <!-- DECISION 1: Duplicate? (y: 125-175)                       -->
  <!-- ═══════════════════════════════════════════════════════════ -->
  <polygon points="295,125 365,150 295,175 225,150" fill="#f3f4f6" stroke="#9ca3af" stroke-width="1.5"/>
  <text x="295" y="154" text-anchor="middle" font-size="11" font-weight="600" fill="#374151">Duplicate?</text>

  <!-- YES → right to L0 Drop (merge) -->
  <line x1="365" y1="150" x2="598" y2="150" stroke="#ef4444" stroke-width="1.5" marker-end="url(#arrow-red)"/>
  <text x="382" y="143" font-size="10" font-weight="600" fill="#ef4444">Yes</text>

  <!-- NO → down -->
  <line x1="295" y1="175" x2="295" y2="200" stroke="#6b7280" stroke-width="1.5" marker-end="url(#arrow-gray)"/>
  <text x="307" y="192" font-size="10" font-weight="600" fill="#6b7280">No</text>

  <!-- ═══════════════════════════════════════════════════════════ -->
  <!-- DECISION 2: Hard L2 rule? (y: 205-255)                    -->
  <!-- ═══════════════════════════════════════════════════════════ -->
  <polygon points="295,205 380,230 295,255 210,230" fill="#fffbeb" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="295" y="234" text-anchor="middle" font-size="11" font-weight="600" fill="#92400e">Hard L2 rule?</text>
  <!-- Subtitle below diamond -->
  <text x="295" y="268" text-anchor="middle" font-size="9" fill="#b45309" font-style="italic">never_auto list</text>

  <!-- YES → right to L2 Staged -->
  <line x1="380" y1="230" x2="598" y2="230" stroke="#f59e0b" stroke-width="1.5" marker-end="url(#arrow-amber)"/>
  <text x="397" y="223" font-size="10" font-weight="600" fill="#f59e0b">Yes</text>

  <!-- NO → down -->
  <line x1="295" y1="255" x2="295" y2="280" stroke="#6b7280" stroke-width="1.5" marker-end="url(#arrow-gray)"/>
  <text x="307" y="272" font-size="10" font-weight="600" fill="#6b7280">No</text>

  <!-- ═══════════════════════════════════════════════════════════ -->
  <!-- DECISION 3: Config L2 match? (y: 285-335)                 -->
  <!-- ═══════════════════════════════════════════════════════════ -->
  <polygon points="295,285 375,310 295,335 215,310" fill="#fffbeb" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="295" y="314" text-anchor="middle" font-size="11" font-weight="600" fill="#92400e">Config L2?</text>
  <!-- Subtitle below diamond -->
  <text x="295" y="348" text-anchor="middle" font-size="9" fill="#b45309" font-style="italic">trust_policy.L2_staged</text>

  <!-- YES → right, then curve up to L2 box -->
  <path d="M 375,310 L 560,310 L 560,248 L 598,248" fill="none" stroke="#f59e0b" stroke-width="1.5" marker-end="url(#arrow-amber)"/>
  <text x="392" y="303" font-size="10" font-weight="600" fill="#f59e0b">Yes</text>

  <!-- NO → down -->
  <line x1="295" y1="335" x2="295" y2="360" stroke="#6b7280" stroke-width="1.5" marker-end="url(#arrow-gray)"/>
  <text x="307" y="352" font-size="10" font-weight="600" fill="#6b7280">No</text>

  <!-- ═══════════════════════════════════════════════════════════ -->
  <!-- DECISION 4: Config L3 match? (y: 365-415)                 -->
  <!-- ═══════════════════════════════════════════════════════════ -->
  <polygon points="295,365 375,390 295,415 215,390" fill="#f0fdf4" stroke="#16a34a" stroke-width="1.5"/>
  <text x="295" y="394" text-anchor="middle" font-size="11" font-weight="600" fill="#15803d">Config L3?</text>
  <!-- Subtitle below diamond -->
  <text x="295" y="428" text-anchor="middle" font-size="9" fill="#16a34a" font-style="italic">trust_policy.L3_auto_write</text>

  <!-- YES → right to L3 Auto-write -->
  <line x1="375" y1="390" x2="598" y2="390" stroke="#16a34a" stroke-width="1.5" marker-end="url(#arrow-green)"/>
  <text x="392" y="383" font-size="10" font-weight="600" fill="#16a34a">Yes</text>

  <!-- NO → down -->
  <line x1="295" y1="415" x2="295" y2="440" stroke="#6b7280" stroke-width="1.5" marker-end="url(#arrow-gray)"/>
  <text x="307" y="432" font-size="10" font-weight="600" fill="#6b7280">No</text>

  <!-- ═══════════════════════════════════════════════════════════ -->
  <!-- DECISION 5: Confidence >= medium? (y: 445-495)            -->
  <!-- ═══════════════════════════════════════════════════════════ -->
  <polygon points="295,445 395,470 295,495 195,470" fill="#faf5ff" stroke="#9333ea" stroke-width="1.5"/>
  <text x="295" y="467" text-anchor="middle" font-size="10" font-weight="600" fill="#6b21a8">Confidence</text>
  <text x="295" y="479" text-anchor="middle" font-size="10" font-weight="600" fill="#6b21a8">&gt;= medium?</text>

  <!-- YES → right to L1 Candidate -->
  <line x1="395" y1="470" x2="598" y2="470" stroke="#9333ea" stroke-width="1.5" marker-end="url(#arrow-purple)"/>
  <text x="412" y="463" font-size="10" font-weight="600" fill="#9333ea">Yes</text>

  <!-- NO → down to L0 Drop (low confidence) -->
  <line x1="295" y1="495" x2="295" y2="515" stroke="#ef4444" stroke-width="1.5" marker-end="url(#arrow-red)"/>
  <text x="307" y="510" font-size="10" font-weight="600" fill="#6b7280">No</text>

  <!-- L0 Drop low confidence box (bottom center) -->
  <rect x="215" y="518" width="160" height="34" rx="8" fill="#fef2f2" stroke="#fca5a5" stroke-width="1.5"/>
  <text x="295" y="535" text-anchor="middle" font-size="11" font-weight="600" fill="#991b1b">L0 Drop</text>
  <text x="295" y="547" text-anchor="middle" font-size="9" fill="#991b1b">low confidence</text>

  <!-- ═══════════════════════════════════════════════════════════ -->
  <!-- RIGHT COLUMN: OUTCOME BOXES (x: 600-930)                 -->
  <!-- ═══════════════════════════════════════════════════════════ -->

  <!-- L0 Drop — merge into existing (red accent) -->
  <rect x="600" y="132" width="300" height="38" rx="8" fill="#fef2f2" stroke="#fca5a5" stroke-width="1.5"/>
  <text x="750" y="150" text-anchor="middle" font-size="11" font-weight="600" fill="#991b1b">L0 Drop</text>
  <text x="750" y="164" text-anchor="middle" font-size="9" fill="#991b1b">merge into existing</text>

  <!-- L2 Staged — human review required (amber accent) -->
  <rect x="600" y="210" width="300" height="48" rx="8" fill="#fffbeb" stroke="#fde68a" stroke-width="1.5"/>
  <text x="750" y="232" text-anchor="middle" font-size="11" font-weight="600" fill="#92400e">L2 Staged</text>
  <text x="750" y="248" text-anchor="middle" font-size="9" fill="#92400e">human review required</text>

  <!-- L3 Auto-write (green accent) -->
  <rect x="600" y="372" width="300" height="40" rx="8" fill="#dcfce7" stroke="#86efac" stroke-width="1.5"/>
  <text x="750" y="390" text-anchor="middle" font-size="11" font-weight="600" fill="#15803d">L3 Auto-write</text>
  <text x="750" y="404" text-anchor="middle" font-size="9" fill="#15803d">memory/ — views regenerated</text>

  <!-- L1 Candidate (purple accent) -->
  <rect x="600" y="450" width="300" height="40" rx="8" fill="#ede9fe" stroke="#c4b5fd" stroke-width="1.5"/>
  <text x="750" y="468" text-anchor="middle" font-size="11" font-weight="600" fill="#5b21b6">L1 Candidate</text>
  <text x="750" y="482" text-anchor="middle" font-size="9" fill="#5b21b6">signals/</text>

  <!-- L1 accumulation annotation: dashed box below L1 -->
  <rect x="620" y="498" width="260" height="34" rx="6" fill="#ffffff" stroke="#c4b5fd" stroke-width="1" stroke-dasharray="5,3"/>
  <text x="750" y="513" text-anchor="middle" font-size="9" fill="#6b21a8">&gt;= 3 same domain+subject</text>
  <text x="750" y="525" text-anchor="middle" font-size="9" fill="#6b21a8">auto-promote to L2</text>

  <!-- Dashed arrow from L1 accumulation box curving up to L2 box -->
  <path d="M 910,515 L 930,515 L 930,234 L 902,234" fill="none" stroke="#9333ea" stroke-width="1.5" stroke-dasharray="6,4" marker-end="url(#arrow-purple-dash)"/>

  <!-- ═══════════════════════════════════════════════════════════ -->
  <!-- HARD RULES CALLOUT (bottom left)                          -->
  <!-- ═══════════════════════════════════════════════════════════ -->
  <rect x="20" y="460" width="170" height="92" rx="8" fill="#ffffff" stroke="#9ca3af" stroke-width="1" stroke-dasharray="5,3"/>
  <text x="30" y="478" font-size="10" font-weight="600" fill="#374151">Hard Rules (always L2)</text>
  <line x1="30" y1="484" x2="180" y2="484" stroke="#e5e7eb" stroke-width="1"/>
  <text x="30" y="498" font-size="9" fill="#6b7280">&#8226; New global no-go</text>
  <text x="30" y="512" font-size="9" fill="#6b7280">&#8226; Stage change</text>
  <text x="30" y="526" font-size="9" fill="#6b7280">&#8226; scope == 'global' behavior</text>
  <text x="30" y="540" font-size="9" fill="#6b7280">&#8226; Items in never_auto list</text>
</svg>