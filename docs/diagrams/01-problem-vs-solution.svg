<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 560" width="960" height="560" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', Arial, 'PingFang SC', 'Microsoft YaHei', sans-serif">
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <polygon points="0 0, 8 4, 0 8" fill="#5a5a5a"/>
    </marker>
  </defs>
  <rect width="960" height="560" fill="#f8f6f3"/>

  <text x="480" y="44" text-anchor="middle" font-size="22" font-weight="700" fill="#1a1a1a">AI without project memory  vs.  AI with Cairn</text>
  <text x="480" y="70" text-anchor="middle" font-size="14" fill="#6a6a6a">The same project, six months apart, same suggestion, different outcome.</text>

  <!-- LEFT panel: no memory -->
  <rect x="40" y="100" width="430" height="430" rx="14" fill="#ffffff" stroke="#4a4a4a" stroke-width="2"/>
  <rect x="40" y="100" width="430" height="46" rx="14" fill="#e8e6e3" stroke="#4a4a4a" stroke-width="2"/>
  <text x="255" y="130" text-anchor="middle" font-size="16" font-weight="700" fill="#1a1a1a">Without Cairn  —  cognitive amnesia</text>

  <rect x="68" y="172" width="374" height="62" rx="10" fill="#a8c5e6" stroke="#4a4a4a" stroke-width="1.5"/>
  <text x="255" y="194" text-anchor="middle" font-size="13" font-weight="600" fill="#1a1a1a">User asks: "Add caching for /products."</text>
  <text x="255" y="216" text-anchor="middle" font-size="12" fill="#1a1a1a">AI reads code, picks the most popular library.</text>

  <line x1="255" y1="234" x2="255" y2="266" stroke="#5a5a5a" stroke-width="2" marker-end="url(#arrow)"/>

  <rect x="68" y="272" width="374" height="62" rx="10" fill="#9dd4c7" stroke="#4a4a4a" stroke-width="1.5"/>
  <text x="255" y="294" text-anchor="middle" font-size="13" font-weight="600" fill="#1a1a1a">"I recommend Redis."</text>
  <text x="255" y="316" text-anchor="middle" font-size="12" fill="#1a1a1a">— same recommendation as six months ago.</text>

  <line x1="255" y1="334" x2="255" y2="366" stroke="#5a5a5a" stroke-width="2" marker-end="url(#arrow)"/>

  <rect x="68" y="372" width="374" height="62" rx="10" fill="#f4e4c1" stroke="#4a4a4a" stroke-width="1.5"/>
  <text x="255" y="394" text-anchor="middle" font-size="13" font-weight="600" fill="#1a1a1a">Team has to re-argue the same point.</text>
  <text x="255" y="416" text-anchor="middle" font-size="12" fill="#1a1a1a">The earlier rejection lives only in chat history.</text>

  <text x="255" y="478" text-anchor="middle" font-size="12" fill="#6a6a6a">Path-dependent context is invisible.</text>
  <text x="255" y="496" text-anchor="middle" font-size="12" fill="#6a6a6a">Trauma + tradeoffs are not addressable.</text>
  <text x="255" y="514" text-anchor="middle" font-size="12" fill="#6a6a6a">Same wall, hit twice.</text>

  <!-- RIGHT panel: with cairn -->
  <rect x="490" y="100" width="430" height="430" rx="14" fill="#ffffff" stroke="#4a4a4a" stroke-width="2"/>
  <rect x="490" y="100" width="430" height="46" rx="14" fill="#9dd4c7" stroke="#4a4a4a" stroke-width="2"/>
  <text x="705" y="130" text-anchor="middle" font-size="16" font-weight="700" fill="#1a1a1a">With Cairn  —  durable cognition</text>

  <rect x="518" y="172" width="374" height="62" rx="10" fill="#a8c5e6" stroke="#4a4a4a" stroke-width="1.5"/>
  <text x="705" y="194" text-anchor="middle" font-size="13" font-weight="600" fill="#1a1a1a">User asks: "Add caching for /products."</text>
  <text x="705" y="216" text-anchor="middle" font-size="12" fill="#1a1a1a">AI calls cairn_context first.</text>

  <line x1="705" y1="234" x2="705" y2="266" stroke="#5a5a5a" stroke-width="2" marker-end="url(#arrow)"/>

  <rect x="518" y="272" width="374" height="62" rx="10" fill="#9dd4c7" stroke="#4a4a4a" stroke-width="1.5"/>
  <text x="705" y="294" text-anchor="middle" font-size="13" font-weight="600" fill="#1a1a1a">"Project has a G3 no-go on Redis."</text>
  <text x="705" y="316" text-anchor="middle" font-size="12" fill="#1a1a1a">"Proposing in-process LRU instead."</text>

  <line x1="705" y1="334" x2="705" y2="366" stroke="#5a5a5a" stroke-width="2" marker-end="url(#arrow)"/>

  <rect x="518" y="372" width="374" height="62" rx="10" fill="#f4e4c1" stroke="#4a4a4a" stroke-width="1.5"/>
  <text x="705" y="394" text-anchor="middle" font-size="13" font-weight="600" fill="#1a1a1a">Team confirms. Decision captured.</text>
  <text x="705" y="416" text-anchor="middle" font-size="12" fill="#1a1a1a">Next AI agent inherits the same context.</text>

  <text x="705" y="478" text-anchor="middle" font-size="12" fill="#6a6a6a">Constraints + rejections are addressable.</text>
  <text x="705" y="496" text-anchor="middle" font-size="12" fill="#6a6a6a">DNA traits emerge from real patterns.</text>
  <text x="705" y="514" text-anchor="middle" font-size="12" fill="#6a6a6a">Project memory survives the session.</text>
</svg>
