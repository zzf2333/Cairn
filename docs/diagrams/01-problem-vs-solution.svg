<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 560" width="960" height="560">
  <style>
    text { font-family: "Helvetica Neue", Helvetica, Arial, "PingFang SC", "Microsoft YaHei", sans-serif; }
  </style>
  <defs>
    <marker id="arrow-red" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#dc2626"/>
    </marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#16a34a"/>
    </marker>
    <marker id="arrow-blue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2563eb"/>
    </marker>
  </defs>
  <rect width="960" height="560" fill="#ffffff"/>
  <text x="480" y="38" text-anchor="middle" font-size="20" font-weight="600" fill="#111827">The Problem Cairn Solves</text>
  <text x="480" y="60" text-anchor="middle" font-size="13" fill="#6b7280">Every AI session starts from zero — unless you give it a memory.</text>
  <!-- Left panel background -->
  <rect x="20" y="78" width="430" height="462" rx="12" fill="#fff5f5" stroke="#fca5a5" stroke-width="1.5"/>
  <!-- Left header -->
  <rect x="20" y="78" width="430" height="44" rx="12" fill="#dc2626"/>
  <rect x="20" y="100" width="430" height="22" fill="#dc2626"/>
  <text x="235" y="106" text-anchor="middle" font-size="14" font-weight="600" fill="#ffffff">WITHOUT CAIRN</text>
  <!-- AI session box -->
  <rect x="60" y="140" width="350" height="60" rx="8" fill="#ffffff" stroke="#d1d5db" stroke-width="1.5"/>
  <!-- Brain icon circle -->
  <circle cx="94" cy="170" r="18" fill="#fee2e2" stroke="#fca5a5" stroke-width="1.5"/>
  <text x="94" y="175" text-anchor="middle" font-size="16">🤖</text>
  <text x="200" y="163" text-anchor="middle" font-size="14" font-weight="600" fill="#111827">AI Session — Month 18</text>
  <text x="200" y="182" text-anchor="middle" font-size="12" fill="#6b7280">No project history available</text>
  <line x1="235" y1="200" x2="235" y2="228" stroke="#dc2626" stroke-width="1.5" marker-end="url(#arrow-red)"/>
  <text x="235" y="246" text-anchor="middle" font-size="12" fill="#6b7280">AI suggests...</text>
  <!-- Suggestion 1 -->
  <rect x="60" y="255" width="350" height="44" rx="8" fill="#fef2f2" stroke="#fca5a5" stroke-width="1.5"/>
  <text x="88" y="282" font-size="18" fill="#dc2626">✕</text>
  <text x="115" y="275" font-size="13" font-weight="600" fill="#111827">Use Redux Toolkit</text>
  <text x="115" y="292" font-size="11" fill="#9ca3af">Migrated away in Month 7 (boilerplate cost)</text>
  <!-- Suggestion 2 -->
  <rect x="60" y="308" width="350" height="44" rx="8" fill="#fef2f2" stroke="#fca5a5" stroke-width="1.5"/>
  <text x="88" y="335" font-size="18" fill="#dc2626">✕</text>
  <text x="115" y="328" font-size="13" font-weight="600" fill="#111827">Migrate API layer to tRPC</text>
  <text x="115" y="345" font-size="11" fill="#9ca3af">Tried in Month 11, rolled back (integration cost)</text>
  <!-- Suggestion 3 -->
  <rect x="60" y="361" width="350" height="44" rx="8" fill="#fef2f2" stroke="#fca5a5" stroke-width="1.5"/>
  <text x="88" y="388" font-size="18" fill="#dc2626">✕</text>
  <text x="115" y="381" font-size="13" font-weight="600" fill="#111827">Break into Microservices</text>
  <text x="115" y="398" font-size="11" fill="#9ca3af">Team too small, evaluated and excluded</text>
  <rect x="60" y="420" width="350" height="56" rx="8" fill="#fee2e2" stroke="#fca5a5" stroke-width="1"/>
  <text x="235" y="444" text-anchor="middle" font-size="13" font-weight="600" fill="#dc2626">10 min re-explaining each session</text>
  <text x="235" y="462" text-anchor="middle" font-size="12" fill="#7f1d1d">Next week: same loop. Same AI. Same suggestions.</text>
  <!-- "Every session" banner -->
  <text x="235" y="504" text-anchor="middle" font-size="12" fill="#9ca3af">AI is a "brilliant new hire" — every single time.</text>
  <!-- VS Badge -->
  <circle cx="480" cy="310" r="26" fill="#111827" stroke="#ffffff" stroke-width="3"/>
  <text x="480" y="315" text-anchor="middle" font-size="14" font-weight="600" fill="#ffffff">VS</text>
  <line x1="480" y1="90" x2="480" y2="280" stroke="#e5e7eb" stroke-width="1.5" stroke-dasharray="6,4"/>
  <line x1="480" y1="340" x2="480" y2="530" stroke="#e5e7eb" stroke-width="1.5" stroke-dasharray="6,4"/>
  <!-- Right panel background -->
  <rect x="510" y="78" width="430" height="462" rx="12" fill="#f0fdf4" stroke="#86efac" stroke-width="1.5"/>
  <!-- Right header -->
  <rect x="510" y="78" width="430" height="44" rx="12" fill="#16a34a"/>
  <rect x="510" y="100" width="430" height="22" fill="#16a34a"/>
  <text x="725" y="106" text-anchor="middle" font-size="14" font-weight="600" fill="#ffffff">WITH CAIRN</text>
  <rect x="550" y="140" width="350" height="60" rx="8" fill="#ffffff" stroke="#d1d5db" stroke-width="1.5"/>
  <circle cx="584" cy="170" r="18" fill="#dcfce7" stroke="#86efac" stroke-width="1.5"/>
  <text x="584" y="175" text-anchor="middle" font-size="16">🤖</text>
  <text x="690" y="163" text-anchor="middle" font-size="14" font-weight="600" fill="#111827">AI Session — Month 18</text>
  <text x="690" y="182" text-anchor="middle" font-size="12" fill="#16a34a">Reads .cairn/output.md first</text>
  <line x1="725" y1="200" x2="725" y2="228" stroke="#16a34a" stroke-width="1.5" marker-end="url(#arrow-green)"/>
  <rect x="550" y="230" width="350" height="130" rx="8" fill="#111827" stroke="#374151" stroke-width="1.5"/>
  <rect x="550" y="230" width="350" height="26" rx="8" fill="#374151"/>
  <rect x="550" y="244" width="350" height="12" fill="#374151"/>
  <text x="725" y="247" text-anchor="middle" font-size="11" fill="#9ca3af">.cairn/output.md</text>
  <text x="572" y="278" font-size="11" fill="#86efac" font-family="monospace">## no-go</text>
  <text x="572" y="295" font-size="11" fill="#d1d5db" font-family="monospace">- tRPC  # integration cost too high</text>
  <text x="572" y="312" font-size="11" fill="#d1d5db" font-family="monospace">- Redux  # team size makes it wasteful</text>
  <text x="572" y="329" font-size="11" fill="#86efac" font-family="monospace">## stage: early-growth</text>
  <text x="572" y="346" font-size="11" fill="#d1d5db" font-family="monospace">## accepted debt: auth-jwt-session</text>
  <line x1="725" y1="360" x2="725" y2="388" stroke="#16a34a" stroke-width="1.5" marker-end="url(#arrow-green)"/>
  <!-- Good suggestion 1 -->
  <rect x="550" y="395" width="350" height="44" rx="8" fill="#dcfce7" stroke="#86efac" stroke-width="1.5"/>
  <text x="578" y="422" font-size="18" fill="#16a34a">✓</text>
  <text x="605" y="415" font-size="13" font-weight="600" fill="#111827">Context-aware suggestions</text>
  <text x="605" y="432" font-size="11" fill="#166534">Respects your no-go rules automatically</text>
  <!-- Good suggestion 2 -->
  <rect x="550" y="448" width="350" height="44" rx="8" fill="#dcfce7" stroke="#86efac" stroke-width="1.5"/>
  <text x="578" y="475" font-size="18" fill="#16a34a">✓</text>
  <text x="605" y="468" font-size="13" font-weight="600" fill="#111827">Stage-calibrated advice</text>
  <text x="605" y="485" font-size="11" fill="#166534">Knows "growth" means stability > new features</text>
  <text x="725" y="516" text-anchor="middle" font-size="12" fill="#6b7280">One .cairn/ setup. Every session benefits.</text>
</svg>