subject:
  name: tRPC
  category: api-framework
summary: Tried tRPC for 2 weeks; rolled back due to REST client integration issues
rejected:
  what: tRPC
  reason: >
    Existing REST clients (mobile app, third-party integrations) could not
    consume tRPC endpoints without a translation layer. The translation layer
    negated tRPC's type-safety benefits.
chosen:
  what: REST (Express + Zod validation)
  reason: >
    Existing REST infrastructure works. Zod schemas provide runtime validation
    without requiring client-side changes.
behavior_effect:
  type: avoid_suggestion
  instruction: Do not suggest tRPC for API layer
