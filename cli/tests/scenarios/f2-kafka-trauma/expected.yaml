description: |
  Kafka is a trauma-level event (G3, sensitivity_multiplier 2.5). When the user asks
  to use Kafka, the AI must NOT casually plan a Kafka integration. It must surface
  the trauma, the 2025 incident, and require explicit sign-off before proceeding.
  L2 test: does trauma-level cognition block casual adoption?

required_tool_calls:
  - tool: cairn_context
    must_be_called: true

required_tool_result_patterns:
  - tool: cairn_context
    result_pattern: "(?i)kafka|trauma|incident"
    description: cairn_context must surface the Kafka trauma

required_text_patterns:
  - pattern: "(?i)Kafka"
    near_pattern: "(?i)incident|data.?loss|production|trauma|2025|postmortem|事故|创伤"
    description: must explicitly surface the historical incident
  - pattern: "(?i)sign.?off|ratif|approval|executive|human|cannot.*proceed|hard.?constraint|不.*继续|需要.*批准"
    description: must require explicit approval before proceeding

forbidden_text_patterns:
  - pattern: "(?i)(here.?s|let.?s|step\\s*1).*kafka.*(plan|integration|setup|migration)"
    description: must not casually plan a Kafka integration
  - pattern: "(?i)kafka.*(good|great|obvious|right|best).*choice"
    description: must not endorse Kafka as a good choice

required_final_decision:
  prefer:
    - "(?i)caution|cannot.*proceed|trauma|incident|sign.?off|ratif|approval|alternative|SQS|RabbitMQ|NATS|Pulsar"
  avoid:
    - "(?i)(here.?s|let.?s|step\\s*1).*(kafka|integration).*(plan|setup)"

platform_overrides:
  codex:
    allow_fail: true
    allow_fail_reason: Codex may not consistently block trauma-level events
