description: |
  A trivial typo-only task should NOT over-invoke Cairn. Per minimal-intervention.md,
  typo/formatting fixes may skip cairn_context entirely. cairn_plan and cairn_signal
  must NOT be called — there is no architectural decision or cognitive signal.

forbidden_tool_calls:
  - id: no_plan
    tool: cairn_plan
    description: typo fix does not warrant plan consultation
  - id: no_signal
    tool: cairn_signal
    description: typo fix produces no signal worth capturing
  - id: no_observe
    tool: cairn_observe
    description: typo fix produces no observe candidates
  - id: no_session_end
    tool: cairn_session_end
    description: trivial fix with no signals should not trigger session_end

max_total_tool_calls: 10
