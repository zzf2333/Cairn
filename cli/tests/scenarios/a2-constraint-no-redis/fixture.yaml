blood:
  - id: blood_no_redis
    time: "2025-11-02"
    domain: infra
    type: constraint_added
    gravity: { level: G3, architectural: high }
    source: { type: conversation, confidence: 0.95, verified: true, refs: [] }
    subject:
      name: Redis
      aliases: [in-memory cache, key-value store]
    trigger: Team policy decision — Redis is not on the approved infra stack.
    decision_or_change: "Constraint: never introduce Redis into this project."
    rejected_paths:
      - path: Redis-backed cache
        reason: Operational complexity (HA setup, persistence, key eviction tuning) is too high for our small ops team.
      - path: Redis pubsub for queues
        reason: Same operational concern.
    reasoning: |
      We have 2 part-time ops engineers. Every additional stateful service is a 24/7 burden.
      Use in-process caches (LRU) or the existing Postgres for cache-like needs.
    constraints_added:
      - "infra: no Redis under any role (cache, pubsub, sessions)"
    behavior_effect:
      type: avoid_suggestion
      instruction: Never recommend Redis. Recommend in-process or DB-backed alternatives instead.
    affects: { skeleton: false, dna: false, domains: [infra, api] }
    lifecycle: { validity: strategic, decay_policy: permanent, resurrection_count: 0 }
    governance_status: ratified
