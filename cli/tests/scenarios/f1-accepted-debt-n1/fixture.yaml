  domains:
    - api
    - feed
  cognitive_mode: standard

state:
  stage:
    phase: growth
    confidence: 0.7
    status: advisory

skeleton:
  - domain: feed
    role: social feed and timeline aggregation
    owns:
      - feed_query
      - timeline
      - aggregation
    causal_keywords:
      - feed
