description: |
  DNA reevaluation_mode=true means accepted traits temporarily stop modulating decisions.
  The AI should give a neutral recommendation (not biased by simplicity_bias) AND
  acknowledge the reevaluation status so the user knows DNA is paused.

required_tool_calls:
  - tool: cairn_context
    must_be_called: true

required_text_patterns:
  # Either the AI surfaces the pause status (CC style) OR it just gives a balanced
  # multi-option recommendation (Codex style). Both prove that DNA isn't biasing
  # toward a single "simplest" answer.
  - pattern: "(?i)reevaluation|drift|DNA paused|paused|reevaluat|trait.*pause|不再.*modulate|安全阀|drift_warning|不建议.*引入|除非|unless|when it fits|何时用|tradeoff|trade.?off|只有.*才|场景|priority|优先"
    description: must surface either the pause status or a tradeoff-aware framing
  - pattern: "(?i)options|depends|either|both.*fine|considerations|when.*fit|alternative|考虑|权衡|可以.*也可以|或|or\\s+|recommend|建议"
    description: must give a more balanced/neutral framing instead of a single forced answer
