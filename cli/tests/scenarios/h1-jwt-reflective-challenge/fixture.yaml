    trigger: Security review rejected storing JWT in localStorage.
    decision_or_change: Use HttpOnly cookies for JWT storage. localStorage is rejected.
    rejected_paths:
      - path: JWT in localStorage
        reason: XSS exposure risk. Security review mandated HttpOnly cookies.
    reasoning: |
      Our security review in January 2026 determined that storing JWT in localStorage
      exposes tokens to XSS attacks. Any injected script can read localStorage.
      HttpOnly cookies were chosen as the standard — they are not accessible via JavaScript.
    constraints_added:
      - "auth: no JWT in localStorage"
    behavior_effect:
      type: avoid_suggestion
      instruction: Avoid storing JWT in localStorage. Use HttpOnly cookies.
    affects:
