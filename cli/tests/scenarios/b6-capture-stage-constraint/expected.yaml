description: |
  User says "not in this phase" about the billing refactor — that's a stage_constraint signal.
  AI must capture it, then proceed with the actual route work.

required_tool_calls:
  - tool: cairn_context
    must_be_called: true
  - tool: cairn_signal
    must_be_called: true
    args_match:
      type: "stage_constraint"
      what: "(?i)billing|refactor"

required_text_patterns:
  - pattern: "(?i)pricing|route|page"
    description: AI should still proceed to the routing task
